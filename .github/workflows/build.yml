name: Build GUI EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 下载代码
      uses: actions/checkout@v4

    - name: 安装Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 打包exe
      run: |
        pyinstaller -F -w main_gui.py -n 工时统计工具

    - name: 上传exe
      uses: actions/upload-artifact@v4
      with:
        name: 工时统计工具
        path: dist/工时统计工具.exe
